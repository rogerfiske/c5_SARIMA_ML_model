# Event Annotations for the c5 Aggregated Matrix Dataset
#
# This file encodes all PO-reviewed exception dates — days where the daily
# part-usage total deviates from the standard output of 30.
#
# These rows are VALID operating-condition data, NOT data defects.
# Annotation enriches the dataset with domain context; it never alters
# the raw count values.
#
# Schema:
#   standard_daily_total: int  — normal operating total (30)
#   reviewed_exceptions: list of {date, total, label, category}
#     date:     YYYY-MM-DD string
#     total:    observed daily part-usage total
#     label:    human-readable event description
#     category: one of [reduced_output, additional_output]

standard_daily_total: 30

